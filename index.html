<!DOCTYPE html>
<html>
<head>
<title>Property Chatbot</title>
<style>
#chatBtn{
position:fixed;
bottom:20px;
right:20px;
background:#c9a84c;
color:white;
padding:15px;
border-radius:50%;
cursor:pointer;
font-size:20px;
}

#chatBox{
display:none;
position:fixed;
bottom:80px;
right:20px;
width:300px;
background:white;
border:1px solid #ddd;
border-radius:10px;
padding:10px;
}

#messages{
height:200px;
overflow:auto;
font-size:14px;
}

input{
width:100%;
padding:8px;
}
</style>
</head>

<body>

<div id="chatBtn">💬</div>

<div id="chatBox">
<div id="messages">
<b>Assistant:</b> Welcome to Sumukh Rabani Properties. How can I help?
</div>

<input id="msg" placeholder="Type message..." onkeypress="send(event)">
</div>

<script>

let stage=0;
let name="";
let phone="";

document.getElementById("chatBtn").onclick=function(){
let box=document.getElementById("chatBox");
box.style.display = box.style.display=="block"?"none":"block";
}

function send(e){
if(e.key!="Enter") return;

let input=document.getElementById("msg");
let text=input.value;

let m=document.getElementById("messages");
m.innerHTML+="<br><b>You:</b> "+text;

input.value="";

if(stage==0){
m.innerHTML+="<br><b>Assistant:</b> May I know your name?";
stage=1;
}
else if(stage==1){
name=text;
m.innerHTML+="<br><b>Assistant:</b> Please share your phone number.";
stage=2;
}
else if(stage==2){
phone=text;
m.innerHTML+="<br><b>Assistant:</b> Thank you "+name+
". Our team will contact you soon.";

let msg="Hello, my name is "+name+
". I am interested in property. Phone: "+phone;

let link="https://wa.me/919804342483?text="+encodeURIComponent(msg);

m.innerHTML+="<br><a href='"+link+"' target='_blank'>Chat on WhatsApp</a>";
stage=3;
}

m.scrollTop=m.scrollHeight;

}

</script>

</body>
</html>
